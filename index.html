<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Copy & Print Portal</title>
    <style>
        :root { --primary: #ff6600; --bg: #ffffff; --light: #f4f4f4; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 50px; }
        header { background: #fff; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); cursor: pointer; user-select: none; }
        
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        /* Admin Control Panel */
        #adminPanel { display: none; background: var(--light); padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 2px dashed var(--primary); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-post { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }

        /* Swipe Gallery Styles */
        .ad-gallery-container { position: relative; width: 100%; background: #000; overflow: hidden; border-bottom: 1px solid #eee; }
        .ad-gallery { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
        .ad-gallery::-webkit-scrollbar { display: none; }

        .ad-gallery-item { flex: 0 0 100%; width: 100%; scroll-snap-align: start; height: 300px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .ad-img { width: 100%; height: 100%; object-fit: contain; background: #eee; }

        .ad-gallery-dots { position: absolute; bottom: 10px; left: 0; right: 0; display: flex; justify-content: center; gap: 5px; }
        .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.5); border-radius: 50%; }
        .dot.active { background: white; transform: scale(1.2); }

        /* Card Layout */
        .ad-card { border: 1px solid #eee; border-radius: 12px; overflow: hidden; margin-bottom: 25px; background: #fff; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .ad-content { padding: 15px; }
        .ad-title { margin: 0 0 8px; color: var(--primary); font-size: 1.25rem; }
        .price { color: #28a745; font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }
        .file-link { display: block; margin-top: 12px; padding: 12px; background: #e7f3ff; color: #007bff; text-decoration: none; border-radius: 8px; text-align: center; font-weight: bold; font-size: 0.9rem; }
        
        .del-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.85); color: white; border: none; padding: 6px 12px; border-radius: 6px; z-index: 20; cursor: pointer; }

        /* Zoom Modal */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { max-width: 95%; max-height: 90%; margin: auto; display: block; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 5px; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }

        #storageWarn { display: none; background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<header><div class="logo" id="mainLogo">Min Copy & Print</div></header>

<div class="container">
    <div id="storageWarn">⚠️ Storage ပြည့်ခါနီးနေပါပြီ။ Post အဟောင်းများ ဖျက်ပေးပါ။</div>

    <section id="adminPanel">
        <h3 style="margin-top:0;">Admin Control</h3>
        <form id="uploadForm">
            <input type="text" id="title" placeholder="ခေါင်းစဉ်" required>
            <textarea id="desc" placeholder="အကြောင်းအရာ..." rows="3"></textarea>
            <input type="text" id="price" placeholder="ဈေးနှုန်း">
            <label style="font-size:0.8rem;">ဓာတ်ပုံများ (၁ ပုံထက်ပို၍ ရွေးနိုင်သည်):</label>
            <input type="file" id="imgInput" accept="image/*" multiple>
            <label style="font-size:0.8rem;">အခြားဖိုင် (PDF, Doc, csv etc.):</label>
            <input type="file" id="fileInput">
            <button type="submit" class="btn-post">Post တင်မည်</button>
        </form>
    </section>

    <div style="text-align:center; color:#888; margin-bottom:15px; font-size:0.85rem;">--- Public View ---</div>
    <div id="displayArea"></div>
</div>

<div id="zoomModal" class="modal" onclick="closeZoom()">
    <span class="close-btn">&times;</span>
    <img class="modal-content" id="modalImg">
</div>

<script>
    const ADMIN_PASS = "1234";
    let isAdmin = localStorage.getItem("isLogged") === "true";

    // Double Click Logo to Login
    document.getElementById("mainLogo").addEventListener("dblclick", () => {
        if(!isAdmin) {
            let p = prompt("Password:");
            if(p === ADMIN_PASS) { isAdmin = true; localStorage.setItem("isLogged", "true"); render(); }
        } else {
            isAdmin = false; localStorage.setItem("isLogged", "false"); render();
        }
    });

    // Image Compressor
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 800;
                    let w = img.width, h = img.height;
                    if (w > h && w > max) { h *= max / w; w = max; }
                    else if (h > max) { w *= max / h; h = max; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        });
    }

    // Submit Post
    document.getElementById("uploadForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const imgFiles = Array.from(document.getElementById("imgInput").files).slice(0, 5);
        const docFile = document.getElementById("fileInput").files[0];

        const imgDataArray = await Promise.all(imgFiles.map(compressImage));
        const docData = docFile ? await new Promise(r => {
            const rd = new FileReader(); rd.readAsDataURL(docFile); rd.onload = () => r(rd.result);
        }) : "";

        const post = {
            id: Date.now(),
            title: document.getElementById("title").value,
            desc: document.getElementById("desc").value,
            price: document.getElementById("price").value,
            images: imgDataArray,
            docData: docData,
            fileName: docFile ? docFile.name : ""
        };

        let posts = JSON.parse(localStorage.getItem("myPosts") || "[]");
        posts.unshift(post);
        try {
            localStorage.setItem("myPosts", JSON.stringify(posts));
            location.reload();
        } catch(err) {
            alert("Storage ပြည့်သွားပါပြီ။ အဟောင်းများဖျက်ပေးပါ။");
        }
    });

    function updateDots(el, postId) {
        const index = Math.round(el.scrollLeft / el.offsetWidth);
        const dots = document.querySelectorAll(`#dots-${postId} .dot`);
        dots.forEach((d, i) => d.classList.toggle('active', i === index));
    }

    function render() {
        document.getElementById("adminPanel").style.display = isAdmin ? "block" : "none";
        const posts = JSON.parse(localStorage.getItem("myPosts") || "[]");
        const area = document.getElementById("displayArea");

        if (JSON.stringify(posts).length > 4000000) {
            document.getElementById("storageWarn").style.display = "block";
        }

        area.innerHTML = posts.map(p => `
            <div class="ad-card">
                ${isAdmin ? `<button class="del-btn" onclick="del(${p.id})">ဖျက်မည်</button>` : ''}
                
                <div class="ad-gallery-container">
                    <div class="ad-gallery" onscroll="updateDots(this, ${p.id})">
                        ${p.images && p.images.length > 0 ? p.images.map(img => `
                            <div class="ad-gallery-item" onclick="zoom('${img}')">
                                <img src="${img}" class="ad-img">
                            </div>
                        `).join('') : '<div style="height:100px; display:flex; align-items:center; justify-content:center; color:#ccc;">(ပုံမရှိပါ)</div>'}
                    </div>
                    <div class="ad-gallery-dots" id="dots-${p.id}">
                        ${p.images ? p.images.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('') : ''}
                    </div>
                </div>

                <div class="ad-content">
                    <h4 class="ad-title">${p.title}</h4>
                    <p style="white-space: pre-wrap; font-size:0.95rem;">${p.desc}</p>
                    <div class="price">${p.price}</div>
                    ${p.docData ? `<a href="${p.docData}" download="${p.fileName}" class="file-link">📁 ဒေါင်းလုဒ်ရန်: ${p.fileName}</a>` : ''}
                </div>
            </div>
        `).join('');
    }

    window.zoom = (src) => {
        document.getElementById("modalImg").src = src;
        document.getElementById("zoomModal").style.display = "block";
        window.history.pushState({modal:true}, "");
    };

    window.closeZoom = () => { document.getElementById("zoomModal").style.display = "none"; };

    window.del = (id) => {
        if(confirm("ဖျက်မှာ သေချာလား?")) {
            let posts = JSON.parse(localStorage.getItem("myPosts")).filter(x => x.id !== id);
            localStorage.setItem("myPosts", JSON.stringify(posts));
            render();
        }
    };

    window.onpopstate = () => closeZoom();
    render();
</script>
</body>
</html>
