<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Ad & File Portal</title>
    <style>
        :root { --primary: #ff6600; --bg: #ffffff; --dark: #333; --light: #f9f9f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--dark); }
        header { background: #fff; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); sticky: top; z-index: 100; }
        .logo { font-size: 1.4rem; font-weight: bold; color: var(--primary); cursor: pointer; user-select: none; }
        
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        #adminPanel { display: none; background: var(--light); padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #ddd; }
        
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-post { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }

        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .ad-card { border: 1px solid #eee; border-radius: 10px; overflow: hidden; position: relative; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .ad-img { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        .ad-content { padding: 15px; }
        .ad-title { margin: 0 0 10px; color: var(--primary); }
        .price { color: #28a745; font-weight: bold; }
        
        /* File Download Link Style */
        .file-link { display: inline-block; margin-top: 10px; padding: 8px 12px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9rem; }
        .file-link:hover { background: #0056b3; }

        .del-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.8); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo" id="mainLogo">Min Copy & Print</div>
</header>

<div class="container">
    <section id="adminPanel">
        <h3>Admin: Post & File Upload</h3>
        <form id="uploadForm">
            <input type="text" id="title" placeholder="ခေါင်းစဉ်" required>
            <textarea id="desc" placeholder="အကြောင်းအရာ..." rows="3"></textarea>
            <input type="text" id="price" placeholder="ဈေးနှုန်း">
            
            <label>ဓာတ်ပုံတင်ရန်:</label>
            <input type="file" id="imgInput" accept="image/*">
            
            <label>အခြားဖိုင်တင်ရန် (PDF, Doc, etc.):</label>
            <input type="file" id="fileInput">
            
            <button type="submit" class="btn-post">Post တင်မည်</button>
        </form>
    </section>

    <div id="displayArea" class="ads-grid"></div>
</div>

<script>
    const ADMIN_PASS = "1234";
    let isAdmin = localStorage.getItem("isLogged") === "true";

    // Double Click Logo for Login
    document.getElementById("mainLogo").addEventListener("dblclick", () => {
        let p = prompt("Password ရိုက်ပါ:");
        if(p === ADMIN_PASS) {
            isAdmin = true;
            localStorage.setItem("isLogged", "true");
            location.reload();
        }
    });

    // Handle Form & File Conversion
    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    document.getElementById("uploadForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const title = document.getElementById("title").value;
        const desc = document.getElementById("desc").value;
        const price = document.getElementById("price").value;
        const imgFile = document.getElementById("imgInput").files[0];
        const docFile = document.getElementById("fileInput").files[0];

        let imgData = imgFile ? await toBase64(imgFile) : "";
        let docData = docFile ? await toBase64(docFile) : "";
        let fileName = docFile ? docFile.name : "";

        const post = { id: Date.now(), title, desc, price, imgData, docData, fileName };
        let posts = JSON.parse(localStorage.getItem("myPosts") || "[]");
        posts.unshift(post);
        
        try {
            localStorage.setItem("myPosts", JSON.stringify(posts));
            alert("တင်ပြီးပါပြီ!");
            location.reload();
        } catch(err) {
            alert("Storage ပြည့်နေလို့ ဖိုင်အဟောင်းတချို့ အရင်ဖျက်ပေးပါ။");
        }
    });

    function render() {
        if(isAdmin) document.getElementById("adminPanel").style.display = "block";
        let posts = JSON.parse(localStorage.getItem("myPosts") || "[]");
        const area = document.getElementById("displayArea");
        
        area.innerHTML = posts.map(p => `
            <div class="ad-card">
                ${isAdmin ? `<button class="del-btn" style="display:block" onclick="del(${p.id})">ဖျက်မည်</button>` : ''}
                ${p.imgData ? `<img src="${p.imgData}" class="ad-img">` : ''}
                <div class="ad-content">
                    <h4 class="ad-title">${p.title}</h4>
                    <p>${p.desc}</p>
                    <div class="price">${p.price}</div>
                    ${p.docData ? `<a href="${p.docData}" download="${p.fileName}" class="file-link">📁 ဖိုင်ဒေါင်းရန် (${p.fileName})</a>` : ''}
                </div>
            </div>
        `).join('');
    }

    window.del = (id) => {
        if(confirm("ဖျက်မှာ သေချာလား?")) {
            let posts = JSON.parse(localStorage.getItem("myPosts")).filter(x => x.id !== id);
            localStorage.setItem("myPosts", JSON.stringify(posts));
            render();
        }
    };

    render();

    // Back button behavior
    window.onpopstate = () => render();
</script>
</body>
</html>
