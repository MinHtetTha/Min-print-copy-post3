<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Copy & Print Portal</title>
    <style>
        :root { --primary: #ff6600; --bg: #ffffff; --light: #f4f4f4; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 50px; }
        header { background: #fff; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); cursor: pointer; }
        
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        /* Admin Section */
        #adminPanel { display: none; background: var(--light); padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 2px dashed var(--primary); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-post { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }

        /* --- Swipe Gallery Fix --- */
        .ad-gallery-container { position: relative; width: 100%; background: #000; overflow: hidden; }
        
        .ad-gallery { 
            display: flex; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            -webkit-overflow-scrolling: touch; /* iOS swipe ချောအောင် */
            scroll-behavior: smooth;
        }
        .ad-gallery::-webkit-scrollbar { display: none; } /* Scrollbar ဖျောက်ထားမယ် */

        .ad-gallery-item { 
            flex: 0 0 100%; /* တစ်ပုံချင်းစီကို screen အပြည့်ယူမယ် */
            width: 100%;
            scroll-snap-align: start; 
            height: 300px; /* ပုံအမြင့် */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .ad-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* ပုံမရှုံ့အောင် contain သုံးမယ် */
            background: #eee; 
        }

        /* Dots Indicator */
        .ad-gallery-dots { 
            position: absolute; bottom: 10px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 5px; 
        }
        .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.5); border-radius: 50%; }
        .dot.active { background: white; transform: scale(1.2); }

        /* Card Styles */
        .ad-card { border: 1px solid #eee; border-radius: 12px; overflow: hidden; margin-bottom: 20px; background: #fff; position: relative; }
        .ad-content { padding: 15px; }
        .ad-title { margin: 0 0 5px; color: var(--primary); font-size: 1.2rem; }
        .price { color: #28a745; font-weight: bold; margin-top: 5px; }
        
        .del-btn { position: absolute; top: 10px; right: 10px; background: red; color: white; border: none; padding: 5px 10px; border-radius: 5px; z-index: 20; display: none; }

        /* Zoom Modal */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: #000; }
        .modal-content { max-width: 100%; max-height: 100%; margin: auto; display: block; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

<header><div class="logo" id="mainLogo">Min Copy & Print</div></header>

<div class="container">
    <section id="adminPanel">
        <form id="uploadForm">
            <input type="text" id="title" placeholder="ခေါင်းစဉ်" required>
            <textarea id="desc" placeholder="အကြောင်းအရာ..."></textarea>
            <input type="text" id="price" placeholder="ဈေးနှုန်း">
            <input type="file" id="imgInput" accept="image/*" multiple>
            <button type="submit" class="btn-post">Post တင်မည်</button>
        </form>
    </section>

    <div id="displayArea"></div>
</div>

<div id="zoomModal" class="modal" onclick="this.style.display='none'">
    <img class="modal-content" id="modalImg">
</div>

<script>
    const ADMIN_PASS = "1234";
    let isAdmin = localStorage.getItem("isLogged") === "true";

    document.getElementById("mainLogo").addEventListener("dblclick", () => {
        let p = prompt("Password:");
        if(p === ADMIN_PASS) { isAdmin = !isAdmin; localStorage.setItem("isLogged", isAdmin); render(); }
    });

    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 800;
                    let w = img.width, h = img.height;
                    if (w > h && w > max) { h *= max / w; w = max; }
                    else if (h > max) { w *= max / h; h = max; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        });
    }

    document.getElementById("uploadForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const files = Array.from(document.getElementById("imgInput").files).slice(0, 5);
        const imgDataArray = await Promise.all(files.map(compressImage));
        
        const post = {
            id: Date.now(),
            title: document.getElementById("title").value,
            desc: document.getElementById("desc").value,
            price: document.getElementById("price").value,
            images: imgDataArray
        };

        let posts = JSON.parse(localStorage.getItem("myPosts") || "[]");
        posts.unshift(post);
        localStorage.setItem("myPosts", JSON.stringify(posts));
        location.reload();
    });

    function updateDots(el, postId) {
        const index = Math.round(el.scrollLeft / el.offsetWidth);
        const dots = document.querySelectorAll(`#dots-${postId} .dot`);
        dots.forEach((d, i) => d.classList.toggle('active', i === index));
    }

    function render() {
        document.getElementById("adminPanel").style.display = isAdmin ? "block" : "none";
        const posts = JSON.parse(localStorage.getItem("myPosts") || "[]");
        document.getElementById("displayArea").innerHTML = posts.map(p => `
            <div class="ad-card">
                ${isAdmin ? `<button class="del-btn" style="display:block" onclick="del(${p.id})">ဖျက်မည်</button>` : ''}
                <div class="ad-gallery-container">
                    <div class="ad-gallery" onscroll="updateDots(this, ${p.id})">
                        ${p.images.map(img => `
                            <div class="ad-gallery-item" onclick="event.stopPropagation(); zoom('${img}')">
                                <img src="${img}" class="ad-img">
                            </div>
                        `).join('')}
                    </div>
                    <div class="ad-gallery-dots" id="dots-${p.id}">
                        ${p.images.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}
                    </div>
                </div>
                <div class="ad-content">
                    <h4 class="ad-title">${p.title}</h4>
                    <p>${p.desc}</p>
                    <div class="price">${p.price}</div>
                </div>
            </div>
        `).join('');
    }

    window.zoom = (src) => {
        document.getElementById("modalImg").src = src;
        document.getElementById("zoomModal").style.display = "block";
    };

    window.del = (id) => {
        if(confirm("ဖျက်မှာလား?")) {
            let posts = JSON.parse(localStorage.getItem("myPosts")).filter(x => x.id !== id);
            localStorage.setItem("myPosts", JSON.stringify(posts));
            render();
        }
    };

    render();
</script>
</body>
</html>
